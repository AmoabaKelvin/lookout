name: release

# Build both Linux architectures and publish a GitHub Release whenever a
# version tag is pushed (e.g. `git tag v1.0.0 && git push origin v1.0.0`).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the release and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # so `git describe` in build.sh can see tags

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: VERSION="${GITHUB_REF_NAME}" sh build.sh

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/lookout-linux-amd64
            dist/lookout-linux-arm64
            dist/checksums.txt
